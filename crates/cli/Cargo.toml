[package]
name        = "nanny"
description = "Nanny CLI — nanny run and nanny init"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[[bin]]
name = "nanny"
path = "src/main.rs"

[dependencies]
