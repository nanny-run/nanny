[package]
name        = "nanny-bridge"
version.workspace   = true
edition.workspace   = true
license.workspace   = true
repository.workspace = true
authors.workspace   = true
publish     = false   # internal — never published to crates.io

[dependencies]
nanny-core   = { path = "../core" }
nanny-policy = { path = "../policy" }
nanny-ledger = { path = "../ledger" }
nanny-tools  = { path = "../tools" }
uuid         = { workspace = true }
thiserror    = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }

# TCP transport — only needed on Windows (non-Unix). On macOS/Linux we use
# a Unix domain socket, which requires no external crate.
[target.'cfg(not(unix))'.dependencies]
tiny_http = "0.12"
