name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nanny-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nanny-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nanny-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nanny

      - name: Build release binary
        run: cargo build --release --bin nanny --target ${{ matrix.target }}
        working-directory: nanny

      - name: Rename artifact
        run: cp nanny/target/${{ matrix.target }}/release/nanny ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nanny-linux-x86_64/nanny-linux-x86_64
            artifacts/nanny-macos-x86_64/nanny-macos-x86_64
            artifacts/nanny-macos-arm64/nanny-macos-arm64
          generate_release_notes: true
