name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for manual publish re-run (e.g. v0.1.4). Runs homebrew-tap-publish, publish-crates, and publish-pypi independently of the build/release jobs."
        required: false
        default: ""

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nanny-linux-x86_64
            archive_ext: tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nanny-macos-x86_64
            archive_ext: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nanny-macos-arm64
            archive_ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nanny-windows-x86_64
            archive_ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin nanny --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "../../../${{ matrix.artifact }}.zip" nanny.exe
          else
            tar czf "../../../${{ matrix.artifact }}.tar.gz" nanny
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between ## [VERSION] and the next ## heading
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "WARNING: No CHANGELOG entry found for ${VERSION} — release notes will be empty." >&2
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          body_path: /tmp/release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}

  homebrew-tap-publish:
    name: Homebrew Tap Publish
    needs: [release]
    # On tag push: runs after release succeeds, skips rc tags.
    # On workflow_dispatch: always() lets this run independently; requires version input.
    if: >-
      always() && (
        (github.event_name == 'push' && needs.release.result == 'success' && !contains(github.ref_name, '-')) ||
        (github.event_name == 'workflow_dispatch' && inputs.version != '')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download release artifacts and compute SHA256s
        id: sha
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          BASE="https://github.com/nanny-run/nanny/releases/download/${TAG}"
          curl -fsSL "${BASE}/nanny-macos-arm64.tar.gz" -o nanny-macos-arm64.tar.gz
          curl -fsSL "${BASE}/nanny-macos-x86_64.tar.gz" -o nanny-macos-x86_64.tar.gz
          curl -fsSL "${BASE}/nanny-linux-x86_64.tar.gz" -o nanny-linux-x86_64.tar.gz
          echo "macos_arm64=$(sha256sum nanny-macos-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "macos_x86_64=$(sha256sum nanny-macos-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(sha256sum nanny-linux-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Homebrew tap publish
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          git clone --depth=1 https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nanny-run/homebrew-nanny.git tap
          cp homebrew/nannyd.rb tap/Formula/nannyd.rb
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" tap/Formula/nannyd.rb
          sed -i "s/{{SHA256_MACOS_ARM64}}/${{ steps.sha.outputs.macos_arm64 }}/" tap/Formula/nannyd.rb
          sed -i "s/{{SHA256_MACOS_X86_64}}/${{ steps.sha.outputs.macos_x86_64 }}/" tap/Formula/nannyd.rb
          sed -i "s/{{SHA256_LINUX_X86_64}}/${{ steps.sha.outputs.linux }}/" tap/Formula/nannyd.rb
          git -C tap config user.email "noreply@nanny.run"
          git -C tap config user.name "Nanny Release Bot"
          git -C tap add Formula/nannyd.rb
          git -C tap diff --cached --quiet || git -C tap commit -m "nannyd ${VERSION}"
          git -C tap push

  publish-crates:
    name: Publish to crates.io
    # On tag push: waits for build to succeed, skips rc tags.
    # On workflow_dispatch: build is skipped; always() lets this job run anyway.
    needs: [build]
    if: >-
      always() && (
        (github.event_name == 'push' && needs.build.result == 'success' && !contains(github.ref_name, '-')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          TAG_VERSION=$(echo "${GITHUB_REF_NAME}" | sed 's/^v//')
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='nannyd'))")
          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag v${TAG_VERSION} does not match Cargo.toml version ${CARGO_VERSION}." >&2
            echo "Bump the workspace version and move the tag before publishing." >&2
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in topological order — each crate before its dependants.
          # Idempotent: skips crates already on crates.io (safe to re-run).
          # Output streams directly to the log so errors are always visible.
          publish() {
            local crate="$1"
            local attempt=1 max=5
            while [ "$attempt" -le "$max" ]; do
              echo "--- Publishing $crate (attempt $attempt/$max) ---"
              set +e
              cargo publish -p "$crate" --no-verify 2>&1 | tee /tmp/cp-out.txt
              local rc=${PIPESTATUS[0]}
              set -e
              if [ "$rc" -eq 0 ]; then
                echo "Published $crate"
                return 0
              fi
              if grep -q "already exists" /tmp/cp-out.txt; then
                echo "Skipping $crate — already published"
                return 0
              fi
              if grep -qE "no matching package|failed to select a version|not yet available|crate .* is not yet available" /tmp/cp-out.txt; then
                echo "Index not ready — sleeping 30s (attempt $attempt/$max)..."
                sleep 30
                attempt=$((attempt + 1))
              else
                echo "=== FATAL: cargo publish $crate exited $rc ===" >&2
                exit 1
              fi
            done
            echo "=== FATAL: $crate failed after $max attempts ===" >&2
            exit 1
          }
          publish nanny-core
          publish nanny-config
          publish nanny-macros
          publish nanny-runtime
          publish nanny-bridge
          # Wait for crates.io to index all dependency crates before publishing nannyd.
          echo "Waiting 45s for crates.io index to propagate..."
          sleep 45
          publish nannyd

  publish-pypi:
    name: Publish to PyPI
    needs: [release]
    # On tag push: runs after release succeeds, skips rc tags.
    # On workflow_dispatch: always() lets this run independently; requires version input.
    if: >-
      always() && (
        (github.event_name == 'push' && needs.release.result == 'success' && !contains(github.ref_name, '-')) ||
        (github.event_name == 'workflow_dispatch' && inputs.version != '')
      )
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SDK_VERSION=$(grep '^version' sdks/python/pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "SDK version: $SDK_VERSION"
          if [ "$TAG_VERSION" != "$SDK_VERSION" ]; then
            echo "ERROR: tag v${TAG_VERSION} does not match pyproject.toml version ${SDK_VERSION}." >&2
            echo "Bump the SDK version before tagging." >&2
            exit 1
          fi

      - name: Build
        run: uv build
        working-directory: sdks/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
