name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # Manually publish crates when a tag-triggered run fails at the publish step.
    # Trigger from the Actions tab → select this workflow → Run workflow → pick main.
    # The version published is whatever is in Cargo.toml at that commit.

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nanny-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nanny-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nanny-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin nanny --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz nanny

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256s
        id: sha
        run: |
          echo "linux=$(sha256sum artifacts/nanny-linux-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "macos_x86_64=$(sha256sum artifacts/nanny-macos-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "macos_arm64=$(sha256sum artifacts/nanny-macos-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}

      - name: Update homebrew tap
        if: ${{ !contains(github.ref_name, '-rc') }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nanny-run/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp homebrew/nannyd.rb tap/Formula/nannyd.rb
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" tap/Formula/nannyd.rb
          sed -i "s/SHA256_MACOS_ARM64/${{ steps.sha.outputs.macos_arm64 }}/" tap/Formula/nannyd.rb
          sed -i "s/SHA256_MACOS_X86_64/${{ steps.sha.outputs.macos_x86_64 }}/" tap/Formula/nannyd.rb
          sed -i "s/SHA256_LINUX_X86_64/${{ steps.sha.outputs.linux }}/" tap/Formula/nannyd.rb
          git -C tap config user.email "noreply@nanny.run"
          git -C tap config user.name "Nanny Release Bot"
          git -C tap add Formula/nannyd.rb
          git -C tap commit -m "nannyd ${VERSION}"
          git -C tap push

  publish-crates:
    name: Publish to crates.io
    # On tag push: waits for build to succeed, skips rc tags.
    # On workflow_dispatch: build is skipped; always() lets this job run anyway.
    needs: [build]
    if: >-
      always() && (
        (github.event_name == 'push' && needs.build.result == 'success' && !contains(github.ref_name, '-rc')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in topological order — each crate before its dependants.
          # --no-verify skips the redundant rebuild-from-registry check; the
          # build job already verified the binaries compile correctly.
          cargo publish -p nanny-core    --no-verify
          cargo publish -p nanny-config  --no-verify
          cargo publish -p nanny-macros  --no-verify
          cargo publish -p nanny-runtime --no-verify
          cargo publish -p nanny-bridge  --no-verify
          cargo publish -p nannyd        --no-verify
