# nanny.toml — webdingo (multi-agent web research pipeline)
# Run: nanny run -- "best Rust HTTP clients"

[runtime]
mode = "local"

[start]
# nanny run          → starts the pipeline (uses built-in default topic)
# nanny run -- topic → passes the research topic as an argument
cmd = "cargo run --release"

# Global ceiling — the entire pipeline cannot exceed these totals.
[limits]
steps   = 30
cost    = 800
timeout = 120000

# Agent 1: Planner — one LLM call, no tools. Tight budget by design.
[limits.planner]
steps   = 5
cost    = 100
timeout = 15000

# Agent 2: Researcher — fetches multiple URLs. The most expensive stage.
# The no_loop rule fires before this budget is exhausted if the model spirals.
[limits.researcher]
steps   = 15
cost    = 500
timeout = 60000

# Agent 3: Synthesizer — one LLM call, no tools.
[limits.synthesizer]
steps   = 5
cost    = 150
timeout = 30000

[tools]
# http_get is nanny's built-in tool — executed bridge-side, cost 10 per call.
# write_file, exec, and all other tools remain denied.
allowed = ["http_get"]

[tools.http_get]
max_calls = 15

# Demo recordings
# Use: nanny run --limits=<name> -- "best Rust HTTP clients"

# demo-budget-exhausted: BudgetExhausted before 3rd http_get executes
# cost_per_call=10: call1→10, call2→20, call3 pre-check: 20+10>25 → BudgetExhausted
[limits.budget-demo]
steps   = 10
cost    = 25
timeout = 120000

# demo-timeout: TimeoutExpired — fires after 6s, before LLM returns, no SDK needed
[limits.timeout-demo]
timeout = 6000

# demo-agent-scopes: generous limits — lets all 3 scopes run and exit cleanly
[limits.agent-scopes-demo]
steps   = 50
cost    = 2000
timeout = 180000

[observability]
log = "stdout"
