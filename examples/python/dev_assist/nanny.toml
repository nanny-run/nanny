# nanny.toml — dev_assist debug agent
# Generated by `nanny init`, then edited for the debugger limits.

[runtime]
mode = "local"

[start]
cmd = "uv run dev debug --trace fixtures/sample_trace.txt"

[limits]
# Global ceiling: applies to every run unless a named scope overrides.
steps   = 100
cost    = 200
timeout = 60000

[limits.debugger]
# Activated by @agent("debugger") in agent.py.
# Inherits from [limits] and overrides what differs.
# timeout=60000 allows the full investigate+patch cycle; demo limit sets
# that have timeout=30000 will still cap this to 30s for those scenarios.
steps   = 30
cost    = 100
timeout = 60000

[limits.demo-budget]
# Demo: BudgetExhausted — file_reader costs 5 each, ripgrep costs 8 each.
# Budget of 12 means the second file_reader call exhausts the budget.
steps   = 30
cost    = 12
timeout = 30000

[limits.demo-steps]
# Demo: MaxStepsReached — cap at 3 steps so the agent hits the ceiling fast.
# timeout=120000: 3 tool calls + 4 LLM calls at ~30s each = ~120s worst case.
steps   = 3
cost    = 100
timeout = 120000

[limits.demo-rule]
# RuleDenied (no_read_loop): generous budget gives the agent enough runway
# to read all 5 files in the complex trace. Rule fires on the 5th total
# file_reader call. timeout=90000: cold model load ~28s + 5 LLM calls ~5s each.
steps   = 50
cost    = 500
timeout = 90000

[limits.demo-tool-denied]
# ToolDenied: generous limits give the agent enough runway to diagnose the bug
# and attempt write_file to apply the fix. write_file is absent from [tools] allowed
# so ToolDenied fires before any file is written.
# timeout=60000 matches [limits.debugger] so the full patch cycle can complete.
steps   = 30
cost    = 200
timeout = 60000

[tools]
# file_reader and ripgrep are permitted.
# write_file is intentionally absent — ToolDenied fires if the LLM hallucinates it.
allowed = ["file_reader", "ripgrep"]

[tools.file_reader]
max_calls     = 15
cost_per_call = 5

[tools.ripgrep]
max_calls     = 8
cost_per_call = 8

[observability]
# NDJSON event log: ExecutionStopped, ToolAllowed, etc. — printed to stdout.
log = "stdout"
