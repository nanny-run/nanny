# nanny.toml — dev_assist debug agent
# Generated by `nanny init`, then edited for the debugger limits.

[runtime]
mode = "local"

[start]
cmd = "uv run dev debug --trace fixtures/sample_trace.txt"

[limits]
# Global ceiling: applies to every run unless a named scope overrides.
steps   = 100
cost    = 200
timeout = 60000

[limits.debugger]
# Activated by @agent("debugger") in agent.py.
# Inherits from [limits] and overrides what differs.
# timeout=60000 allows the full investigate+patch cycle; demo limit sets
# that have timeout=30000 will still cap this to 30s for those scenarios.
steps   = 30
cost    = 100
timeout = 60000

[limits.demo-budget]
# Demo: BudgetExhausted — file_reader costs 5 each, ripgrep costs 8 each.
# Budget of 12 means the second file_reader call exhausts the budget.
steps   = 30
cost    = 12
timeout = 30000

[limits.demo-steps]
# Demo: MaxStepsReached — cap at 3 steps so the agent hits the ceiling fast.
# timeout=120000: 3 tool calls + 4 LLM calls at ~30s each = ~120s worst case.
steps   = 3
cost    = 100
timeout = 120000

[limits.demo-rule]
# RuleDenied (file_reader.max_calls): demo-rule-denied tape lowers max_calls to 3
# via sed before running, so RuleDenied fires on the 4th file_reader call.
# Generous budget so the agent has runway to reach the cap.
# timeout=90000: cold model load ~28s + up to 3 file reads + 3 LLM calls.
steps   = 50
cost    = 500
timeout = 90000

[limits.demo-tool-denied]
# ToolDenied: generous limits give the agent enough runway to diagnose the bug
# and reach apply_patch_node. demo-tool-denied tape removes write_file from
# [tools] allowed via sed before running, so ToolDenied fires before any file
# is written. timeout=60000 matches [limits.debugger] for the full patch cycle.
steps   = 30
cost    = 200
timeout = 60000

[tools]
# file_reader, ripgrep, and write_file are all permitted in normal operation.
# demo-tool-denied tape removes write_file from this list via sed before running,
# so ToolDenied fires when apply_patch_node calls it.
allowed = ["file_reader", "ripgrep", "write_file"]

[tools.file_reader]
max_calls     = 15
cost_per_call = 5

[tools.ripgrep]
max_calls     = 8
cost_per_call = 8

[observability]
# NDJSON event log: ExecutionStopped, ToolAllowed, etc. — printed to stdout.
log = "stdout"
