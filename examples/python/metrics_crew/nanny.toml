# nanny.toml — metrics_crew incident analysis pipeline
# Generated by `nanny init`, then edited for the four-agent pipeline.

[runtime]
mode = "local"

[start]
cmd = "uv run metrics-crew analyze --data fixtures/sample_metrics.csv"

# ── Global ceiling ────────────────────────────────────────────────────────────
# Applies to every run unless a named scope overrides.

[limits]
steps   = 200
cost    = 500
timeout = 600000

# ── Per-role scopes ───────────────────────────────────────────────────────────
# Activated by @nanny_agent("<role>") in each agent file.
# Each scope inherits from [limits] and overrides only what differs.

[limits.ingestion]
# Ingestion is cheap: just reading and validating the CSV.
steps   = 20
cost    = 20
timeout = 30000

[limits.analysis]
# Analysis is expensive: stat computation, anomaly detection, correlation.
steps   = 60
cost    = 150
timeout = 600000

[limits.visualization]
# Visualization: one chart per signal, limited chart calls.
steps   = 20
cost    = 50
timeout = 30000

[limits.reporter]
# Reporting: one write_report call produces the final incident doc.
steps   = 10
cost    = 20
timeout = 20000

# ── Demo limit sets ───────────────────────────────────────────────────────────
# Named sets for demonstrating each exception type.
# Usage: nanny run --limits=<name>

[limits.demo-budget]
# BudgetExhausted: validate_schema(1) + load_metrics(3) = 4 spent,
# leaving only 1 unit. Any subsequent tool call (cost >= 2) is denied.
steps   = 60
cost    = 5
timeout = 600000

[limits.demo-steps]
# MaxStepsReached: cap at 4 steps — fires before analysis completes.
steps   = 4
cost    = 500
timeout = 600000

[limits.demo-rule]
# RuleDenied (no_analysis_loop): generous budget so only the rule fires.
# The no_analysis_loop rule triggers after 5 consecutive compute_stats calls.
steps   = 100
cost    = 1000
timeout = 600000

# ── Tool allowlist ────────────────────────────────────────────────────────────

[tools]
# All seven tools are permitted at the global level.
# Per-agent subsets are enforced by passing only designated tools to each agent.
# ToolDenied fires if CrewAI or the LLM attempts a cross-role call.
allowed = [
    "load_metrics",
    "validate_schema",
    "compute_stats",
    "detect_anomalies",
    "correlate_signals",
    "generate_chart",
    "write_report",
]

[tools.load_metrics]
cost_per_call = 3
max_calls     = 5

[tools.validate_schema]
cost_per_call = 1
max_calls     = 5

[tools.compute_stats]
cost_per_call = 10
max_calls     = 20

[tools.detect_anomalies]
cost_per_call = 10
max_calls     = 10

[tools.correlate_signals]
cost_per_call = 15
max_calls     = 5

[tools.generate_chart]
cost_per_call = 8
max_calls     = 10

[tools.write_report]
cost_per_call = 5
max_calls     = 3

# ── Observability ─────────────────────────────────────────────────────────────

[observability]
log = "stdout"
