# nanny.toml — metrics_crew incident analysis pipeline
# Generated by `nanny init`, then edited for the four-agent pipeline.

[runtime]
mode = "local"

[start]
cmd = "uv run metrics-crew analyze --data fixtures/sample_metrics.csv"

# ── Global ceiling ────────────────────────────────────────────────────────────
# Applies to every run unless a named scope overrides.

[limits]
steps   = 200
cost    = 500
timeout = 600000

# ── Per-role scopes ───────────────────────────────────────────────────────────
# Activated by @nanny_agent("<role>") in each agent file.
# Each scope inherits from [limits] and overrides only what differs.

[limits.ingestion]
# Ingestion is cheap: just reading and validating the CSV.
steps   = 20
cost    = 20
timeout = 30000

[limits.analysis]
# Analysis is expensive: stat computation, anomaly detection, correlation.
steps   = 60
cost    = 150
timeout = 600000

[limits.visualization]
# Visualization: one chart per signal, limited chart calls.
steps   = 20
cost    = 50
timeout = 30000

[limits.reporter]
# Reporting: one write_report call produces the final incident doc.
steps   = 10
cost    = 20
timeout = 20000

# ── Demo limit sets ───────────────────────────────────────────────────────────
# Named sets for demonstrating each exception type.
# Usage: nanny run --limits=<name>

[limits.demo-budget]
# BudgetExhausted: validate_schema(1) + load_metrics(3) = 4 spent,
# leaving only 1 unit. Any subsequent tool call (cost >= 2) is denied.
steps   = 60
cost    = 5
timeout = 600000

[limits.demo-steps]
# MaxStepsReached: cap at 4 steps — fires before analysis completes.
steps   = 4
cost    = 500
timeout = 600000

[limits.demo-rule]
# RuleDenied (compute_stats.max_calls): the demo-rule-denied tape temporarily
# sets [tools.compute_stats] max_calls = 1 via sed before running. The first
# compute_stats call succeeds; the second fires RuleDenied: compute_stats.max_calls.
# Generous budget and steps so only the per-tool call limit fires.
steps   = 100
cost    = 1000
timeout = 600000

# ── Tool allowlist ────────────────────────────────────────────────────────────

[tools]
# All seven tools are permitted at the global level.
# Per-agent subsets are enforced by passing only designated tools to each agent.
# ToolDenied fires if CrewAI or the LLM attempts a cross-role call.
allowed = [
    "load_metrics",
    "validate_schema",
    "compute_stats",
    "detect_anomalies",
    "correlate_signals",
    "generate_chart",
    "write_report",
]

[tools.load_metrics]
cost_per_call = 3
max_calls     = 5

[tools.validate_schema]
cost_per_call = 1
max_calls     = 5

[tools.compute_stats]
cost_per_call = 10
max_calls     = 20

[tools.detect_anomalies]
cost_per_call = 10
max_calls     = 10

[tools.correlate_signals]
cost_per_call = 15
max_calls     = 5

[tools.generate_chart]
cost_per_call = 8
max_calls     = 10

[tools.write_report]
cost_per_call = 5
max_calls     = 3

# ── HTTP proxy (optional) ─────────────────────────────────────────────────────
# Activate when running the governance server for cross-process or cross-machine
# enforcement.  Uncomment `allowed_hosts` and add every external host your crew
# needs to reach.  Requests to any unlisted host receive 403 and fire a
# ToolDenied event — the execution stops.
#
# Start the governance server first:
#   nanny server start           # local multi-process (plain HTTP on 127.0.0.1)
#   nanny server start --proxy   # + enable HTTP CONNECT proxy on the same port
#
# Then point agents at it:
#   NANNY_BRIDGE_ADDR=127.0.0.1:62669 nanny run
#
# For cross-machine enforcement, generate mTLS certs and set NANNY_BRIDGE_ADDR
# to the server's non-loopback address.  See: docs.nanny.run/v0.2/guides/governance-server

# [proxy]
# allowed_hosts = [
#     "api.groq.com",           # LLM inference (Groq)
#     "*.anthropic.com",        # LLM inference (Anthropic) — wildcard covers all subdomains
#     "api.openai.com",         # LLM inference (OpenAI)
# ]

# ── Observability ─────────────────────────────────────────────────────────────

[observability]
log = "stdout"
