# nanny.toml — dev_assist debug agent
# Generated by `nanny init`, then edited for the debugger limits.

[runtime]
mode = "local"

[start]
cmd = "python cli.py"

[limits]
# Global ceiling: applies to every run unless a named scope overrides.
steps   = 100
cost    = 200
timeout = 60000

[limits.debugger]
# Activated by @agent("debugger") in agent.py.
# Inherits from [limits] and overrides what differs.
steps   = 30
cost    = 100
timeout = 30000

[tools]
# Only file_reader and ripgrep are permitted.
# write_file is intentionally absent — ToolDenied fires if the LLM hallucinates it.
allowed = ["file_reader", "ripgrep"]

[tools.file_reader]
max_calls     = 15
cost_per_call = 5

[tools.ripgrep]
max_calls     = 8
cost_per_call = 8

[observability]
# NDJSON event log: ExecutionStopped, ToolAllowed, etc. — printed to stdout.
log = "stdout"
